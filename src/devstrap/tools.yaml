tools:
  - name: git
    description: Version control system
    check: git --version
    install:
      brew: git
      apt: git

  - name: go
    description: Go programming language
    check: go version
    install:
      brew: go
      # Fetch latest version, download tarball, remove old install, extract
      script: |
        GO_VERSION=$(curl -s 'https://go.dev/VERSION?m=text' | head -n 1)
        curl -LO "https://go.dev/dl/${GO_VERSION}.linux-amd64.tar.gz"
        sudo rm -rf /usr/local/go
        sudo tar -C /usr/local -xzf "${GO_VERSION}.linux-amd64.tar.gz"
        rm "${GO_VERSION}.linux-amd64.tar.gz"

  - name: lazygit
    description: Terminal UI for git
    deps: [go]
    check: lazygit --version
    install:
      brew: lazygit
      script: go install github.com/jesseduffield/lazygit@latest

  - name: zsh
    description: Z shell
    check: zsh --version
    install:
      brew: zsh
      apt: zsh

  - name: oh-my-zsh
    description: Framework for managing zsh configuration
    check: test -d $HOME/.oh-my-zsh
    install:
      # --unattended: skip changing default shell and launching zsh after install
      alternatives:
        - script: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
        - script: sh -c "$(wget -qO- https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended

  - name: zsh-autosuggestions
    description: Fish-like autosuggestions for zsh
    deps: [oh-my-zsh]
    check: test -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-autosuggestions
    install:
      script: git clone https://github.com/zsh-users/zsh-autosuggestions ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-autosuggestions

  - name: zsh-syntax-highlighting
    description: Fish-like syntax highlighting for zsh
    deps: [oh-my-zsh]
    check: test -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting
    install:
      script: git clone https://github.com/zsh-users/zsh-syntax-highlighting.git ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting

  - name: powerlevel10k
    description: A fast and flexible Zsh theme
    deps: [oh-my-zsh]
    check: test -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/themes/powerlevel10k
    install:
      # --depth=1: shallow clone to save bandwidth (theme assets only, no full history)
      script: git clone --depth=1 https://github.com/romkatv/powerlevel10k.git "${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/themes/powerlevel10k"

  - name: tmux
    description: Terminal multiplexer
    check: tmux -V
    install:
      brew: tmux
      apt: tmux

  - name: neovim
    description: Hyperextensible text editor
    check: nvim --version
    install:
      # apt omitted: its neovim package is typically far behind the latest release
      brew: neovim
      # Download latest release tarball, remove old install, extract to /opt
      script: |
        curl -LO https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
        sudo rm -rf /opt/nvim-linux-x86_64
        sudo tar -C /opt -xzf nvim-linux-x86_64.tar.gz

  - name: nvim-config
    description: Custom Neovim configuration
    deps: [neovim]
    check: test -d ~/.config/nvim
    install:
      script: git clone git@github.com:lywchaos/nvim-config.git ~/.config/nvim

  - name: fzf
    description: Fuzzy finder
    check: fzf --version
    install:
      brew: fzf
      apt: fzf

  - name: ripgrep
    description: Fast regex search tool
    check: rg --version
    install:
      brew: ripgrep
      apt: ripgrep

  - name: fd
    description: Fast file finder
    # fd-find installs as 'fdfind' on Ubuntu
    check: fd --version || fdfind --version
    install:
      brew: fd
      apt: fd-find

  - name: yq
    description: Portable YAML processor
    check: yq --version
    install:
      brew: yq
      # apt omitted: Debian's yq package is not the upstream mikefarah/yq release
      # Follow GitHub's latest-release redirect, make the binary executable, then move it into /usr/local/bin
      script: |
        curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o yq
        chmod +x yq
        sudo mv yq /usr/local/bin/yq

  - name: navi
    description: Interactive cheatsheet tool
    check: navi --version
    install:
      brew: navi
      # -sL: silent mode with redirect following
      script: "curl -sL https://raw.githubusercontent.com/denisidoro/navi/master/scripts/install | bash"

  - name: chezmoi
    description: Dotfile manager
    check: chezmoi --version
    install:
      brew: chezmoi
      snap: snap install chezmoi --classic
      # -fsLS: fail silently on errors, show errors, follow redirects, use TLS
      script: 'sh -c "$(curl -fsLS get.chezmoi.io)"'

  - name: uv
    description: Python package manager
    check: uv --version
    install:
      brew: uv
      alternatives:
        # -LsSf: follow redirects, silent, show errors, fail on HTTP errors
        - script: "curl -LsSf https://astral.sh/uv/install.sh | sh"
        - script: "wget -qO- https://astral.sh/uv/install.sh | sh"

  - name: zoxide
    description: Smarter cd command
    check: zoxide --version
    install:
      brew: zoxide
      apt: zoxide
      alternatives:
        # -sSfL: silent, show errors, fail on HTTP errors, follow redirects
        - script: "curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh"
        - script: "wget -qO- https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh"

  - name: rust
    description: Systems programming language (installed via rustup)
    check: rustc --version
    install:
      alternatives:
        # --proto '=https' --tlsv1.2: enforce HTTPS/TLS 1.2+ (per official rustup docs)
        # -s -- -y: pass -y to rustup-init for non-interactive install
        - script: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
        - script: "wget -qO- https://sh.rustup.rs | sh -s -- -y"

  - name: just
    description: Command runner for project-specific tasks
    deps: [rust]
    check: just --version
    install:
      script: cargo install just

  - name: claude-code
    description: Anthropic's CLI for Claude
    check: claude --version
    install:
      alternatives:
        - script: "npm install -g @anthropic-ai/claude-code"
        - script: "curl -fsSL https://claude.ai/install.sh | bash"

  - name: sd
    description: sd is an intuitive find & replace CLI.
    check: sd --version
    deps: [rust]
    install:
      script: cargo install sd

  - name: eza
    description: A modern alternative to ls
    check: eza
    deps: [rust]
    install:
      script: cargo install eza

  - name: codex
    description: codex
    check: codex --version
    install:
      script: npm i -g @openai/codex
