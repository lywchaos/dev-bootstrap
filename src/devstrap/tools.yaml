tools:
  - name: git
    description: Version control system
    check: git --version
    install:
      brew: git
      apt: git
      dnf: git
      pacman: git

  - name: zsh
    description: Z shell
    check: zsh --version
    install:
      brew: zsh
      apt: zsh
      dnf: zsh
      pacman: zsh

  - name: oh-my-zsh
    description: Framework for managing zsh configuration
    check: test -d $HOME/.oh-my-zsh
    install:
      scripts:
        # --unattended: skip changing default shell and launching zsh after install
        - sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
        - sh -c "$(wget -qO- https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended

  - name: zsh-autosuggestions
    description: Fish-like autosuggestions for zsh
    deps: [oh-my-zsh]
    check: test -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-autosuggestions
    install:
      scripts:
        - git clone https://github.com/zsh-users/zsh-autosuggestions ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-autosuggestions

  - name: zsh-syntax-highlighting
    description: Fish-like syntax highlighting for zsh
    deps: [oh-my-zsh]
    check: test -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting
    install:
      scripts:
        - git clone https://github.com/zsh-users/zsh-syntax-highlighting.git ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting

  - name: powerlevel10k
    description: A fast and flexible Zsh theme
    deps: [oh-my-zsh]
    check: test -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/themes/powerlevel10k
    install:
      scripts:
        # --depth=1: shallow clone to save bandwidth (theme assets only, no full history)
        - git clone --depth=1 https://github.com/romkatv/powerlevel10k.git "${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/themes/powerlevel10k"

  - name: tmux
    description: Terminal multiplexer
    check: tmux -V
    install:
      brew: tmux
      apt: tmux
      dnf: tmux
      pacman: tmux

  - name: neovim
    description: Hyperextensible text editor
    check: nvim --version
    install:
      brew: neovim
      apt: neovim
      dnf: neovim
      pacman: neovim

  - name: fzf
    description: Fuzzy finder
    check: fzf --version
    install:
      brew: fzf
      apt: fzf
      dnf: fzf
      pacman: fzf

  - name: ripgrep
    description: Fast regex search tool
    check: rg --version
    install:
      brew: ripgrep
      apt: ripgrep
      dnf: ripgrep
      pacman: ripgrep

  - name: fd
    description: Fast file finder
    check: fd --version
    install:
      brew: fd
      apt: fd-find
      dnf: fd-find
      pacman: fd

  - name: navi
    description: Interactive cheatsheet tool
    check: navi --version
    install:
      brew: navi
      scripts:
        - "curl -sL https://raw.githubusercontent.com/denisidoro/navi/master/scripts/install | bash"

  - name: chezmoi
    description: Dotfile manager
    check: chezmoi --version
    install:
      brew: chezmoi
      snap: snap install chezmoi --classic
      scripts:
        - "sh -c \"$(curl -fsLS get.chezmoi.io)\""

  - name: uv
    description: Python package manager
    check: uv --version
    install:
      brew: uv
      scripts:
        - "curl -LsSf https://astral.sh/uv/install.sh | sh"
        - "wget -qO- https://astral.sh/uv/install.sh | sh"

  - name: zoxide
    description: Smarter cd command
    check: zoxide --version
    install:
      brew: zoxide
      apt: zoxide
      dnf: zoxide
      pacman: zoxide
      scripts:
        - "curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh"
        - "wget -qO- https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh"
